{% load static %}
{% load crispy_forms_tags %}
<!DOCTYPE html>
<html lang="en" data-theme="retro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/dist/styles.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>{% block title %}Home{% endblock title %}</title>
</head>

<body class="bg-gray-800">

<!-- NAVBAR -->
<div class="navbar bg-white shadow-md px-6 mb-2">
  
  <!-- LEFT -->
  <div class="flex-1">
    <a class="text-2xl font-bold text-green-600 hover:text-green-800">
      🌙 sk
    </a>
  </div>

  <!-- CENTER MENU -->
  <div class="justify-center items-center flex sm:flex-row flex-col gap-10 mt-2">
    <a class="text-gray-700 hover:text-green-600 font-medium" href="{% url 'home' %}">Home</a>
    <a class="text-gray-700 hover:text-green-600 font-medium" href="{% url 'create' %}">Create_Donation</a>
    <a class="text-gray-700 hover:text-green-600 font-medium" href="{% url 'list' %}">Donation List</a>
    <a class="text-gray-700 hover:text-green-600 font-medium">About</a>
    {% if user.is_authenticated %}
      <ul>
      <a href="{% url "user_profile" %}" class=" btn-warning mx-3">{{ user.username }} </a>
      <a href="{% url "user_logout" %}" class="btn btn-danger mx-3">LogOut</a>
    </ul>    
    {% else %}
    <ul>
      <a href="{% url "signup" %}" class="btn btn-warning mx-3">Sign Up</a>
      <a href="{% url "user_login" %}" class="btn btn-danger mx-3">Login</a>
    </ul>
    {% endif %}
  </div>

  </div>
</div>

  {% block content %}
  
  
  {% endblock content %}
</div>




</body>
</html>
